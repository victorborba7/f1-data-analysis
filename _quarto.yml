project:
  type: website
  output-dir: _site
  # Only render the website files — ignore notebooks in analysis/, template/
  render:
    - index.qmd
    - about.qmd
    - posts/
    - serve/quarto/data-model.qmd
    - serve/quarto/all-time-leaders.qmd

website:
  title: "Victor Borba · F1 Data Analysis"
  description: "Weekly Formula 1 race analysis with Python & FastF1"
  site-url: "https://victorborba7.github.io/f1-data-analysis"
  navbar:
    background: dark
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - text: "Data Platform"
        menu:
          - href: serve/quarto/data-model.qmd
            text: "The Data Model"
          - href: serve/quarto/all-time-leaders.qmd
            text: "All-Time Leaders"
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/victorborba7/f1-data-analysis
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/victor-vasconcellos-borba/
        aria-label: LinkedIn
  page-footer:
    center: "Built with [Quarto](https://quarto.org) · Data via [FastF1](https://github.com/theOehrly/Fast-F1)"

format:
  html:
    theme: [darkly, styles.scss]
    toc: true
    code-fold: true
    code-tools: true
    highlight-style: github

execute:
  # Use committed results in CI instead of re-running FastF1 downloads.
  # Run notebooks locally, commit the _freeze/ folder, and the site builds without Python.
  freeze: auto
