# dbt connection profile (committed) — every value comes from an environment
# variable, so no secrets live in the repo. Copy .env.example to .env and load it
# (the tasks runner does this for you), or export these before running dbt.
#
# Auth: service-account. GOOGLE_APPLICATION_CREDENTIALS must point at a JSON key
# with BigQuery Data Editor + BigQuery Job User on the project.
f1_analytics:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: "{{ env_var('BQ_DATASET_ANALYTICS', 'f1_analytics') }}"
      location: "{{ env_var('BQ_LOCATION', 'US') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      threads: 4
      priority: interactive
      job_execution_timeout_seconds: 600
      job_retries: 1

    # CI uses keyfile JSON injected from a secret instead of a file path.
    ci:
      type: bigquery
      method: service-account-json
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: "{{ env_var('BQ_DATASET_ANALYTICS', 'f1_analytics') }}"
      location: "{{ env_var('BQ_LOCATION', 'US') }}"
      keyfile_json: "{{ env_var('GCP_SA_KEY_JSON') | as_native }}"
      threads: 4
      job_retries: 1
